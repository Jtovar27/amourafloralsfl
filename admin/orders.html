<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — Amoura Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="admin-layout">

  <div class="sb-overlay" id="sb-overlay"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sb-logo">
      <div class="sb-logo-title">Amoura Florals</div>
      <div class="sb-logo-sub">Admin Panel</div>
    </div>
    <nav class="sb-nav">
      <a href="/admin/dashboard" class="sb-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/admin/products" class="sb-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
        Products
      </a>
      <a href="/admin/orders" class="sb-link active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
        Orders
      </a>
      <a href="/admin/content" class="sb-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Content
      </a>
      <a href="/admin/media" class="sb-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Media
      </a>
    </nav>
    <div class="sb-footer">
      <div class="sb-user-email" id="sb-user-email"></div>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:.75rem">
        <button class="sb-toggle" id="sb-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Orders</span>
      </div>
      <a href="/" target="_blank" class="btn btn-ghost btn-sm">View Site ↗</a>
    </header>

    <main class="admin-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Orders</h1>
          <p id="orders-count-label">Loading…</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="toolbar" style="margin:0;flex:1">
            <input class="search-input" id="search-input" type="search" placeholder="Search by name, email, order #…" />
            <select class="filter-select" id="filter-status">
              <option value="">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="confirmed">Confirmed</option>
              <option value="processing">Processing</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Payment</th>
                <th>Delivery</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <tr><td colspan="9"><div class="loading-overlay"><div class="spinner"></div> Loading…</div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="card-body" style="border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem">
          <div id="pagination-info" style="font-size:.8rem;color:var(--muted)"></div>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn-ghost btn-sm" id="btn-prev" disabled>← Prev</button>
            <button class="btn btn-ghost btn-sm" id="btn-next" disabled>Next →</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="order-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <span class="modal-title" id="order-modal-title">Order Details</span>
        <button class="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="order-modal-body">
        <div class="loading-overlay"><div class="spinner"></div> Loading…</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost modal-close">Close</button>
        <button class="btn btn-primary" id="btn-save-status">Save Status</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.46.2/dist/umd/supabase.js"
          integrity="sha384-RXZt/j+J+RFlXxPx7Teta7jIGaeeD5vV1XCeOGz2RbbGdF/MNXmCx62mDKMMc5Oa"
          crossorigin="anonymous"></script>
  <script src="/admin/js/admin-core.js"></script>
  <script src="/admin/js/orders.js"></script>
</body>
</html>
