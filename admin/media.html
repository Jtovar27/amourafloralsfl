<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media — Amoura Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="admin-layout">

  <div class="sb-overlay" id="sb-overlay"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sb-logo">
      <div class="sb-logo-title">Amoura Florals</div>
      <div class="sb-logo-sub">Admin Panel</div>
    </div>
    <nav class="sb-nav">
      <a href="/admin/dashboard" class="sb-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/admin/products" class="sb-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
        Products
      </a>
      <a href="/admin/orders" class="sb-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
        Orders
      </a>
      <a href="/admin/content" class="sb-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Content
      </a>
      <a href="/admin/media" class="sb-link active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Media
      </a>
    </nav>
    <div class="sb-footer">
      <div class="sb-user-email" id="sb-user-email"></div>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:.75rem">
        <button class="sb-toggle" id="sb-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Media</span>
      </div>
      <a href="/" target="_blank" class="btn btn-ghost btn-sm">View Site ↗</a>
    </header>

    <main class="admin-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Media</h1>
          <p>Upload and manage product images</p>
        </div>
      </div>

      <!-- Upload zone -->
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp,image/gif" multiple />
        <svg width="40" height="40" fill="none" stroke="var(--muted)" stroke-width="1" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drag & drop images here, or <strong>click to browse</strong></p>
        <p style="font-size:.75rem;margin-top:.25rem">JPEG, PNG, WebP, GIF · max 5 MB each</p>
        <div id="upload-progress" style="margin-top:1rem;display:none">
          <div class="spinner" style="margin:0 auto"></div>
          <p id="upload-status" style="margin-top:.5rem;font-size:.8rem"></p>
        </div>
      </div>

      <div id="media-note" style="display:none;background:var(--warning-bg);color:var(--warning);padding:.75rem 1rem;border-radius:8px;font-size:.83rem;margin-bottom:1rem"></div>

      <!-- Media grid -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Uploaded Files</span>
          <button class="btn btn-ghost btn-sm" id="btn-refresh-media">Refresh</button>
        </div>
        <div class="card-body">
          <div class="media-grid" id="media-grid">
            <div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div> Loading…</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.46.2/dist/umd/supabase.js"
          integrity="sha384-RXZt/j+J+RFlXxPx7Teta7jIGaeeD5vV1XCeOGz2RbbGdF/MNXmCx62mDKMMc5Oa"
          crossorigin="anonymous"></script>
  <script src="/admin/js/admin-core.js"></script>
  <script src="/admin/js/media.js"></script>
</body>
</html>
