<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Amoura Florals</title>
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="login-page">

  <div class="login-box">
    <div class="login-logo">
      <img src="/assets/images/amoura_logo_transparent_clean.png" alt="Amoura Florals" class="login-logo-img" />
      <div class="login-logo-title">Amoura Florals</div>
      <div class="login-logo-sub">Admin Panel</div>
    </div>
    <h2 class="login-title">Sign In</h2>
    <p class="login-sub">Enter your admin credentials to continue.</p>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem" id="login-btn">
        Sign In
      </button>
    </form>

    <p class="login-footer">Access restricted to authorized administrators only.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.46.2/dist/umd/supabase.js"
          integrity="sha384-RXZt/j+J+RFlXxPx7Teta7jIGaeeD5vV1XCeOGz2RbbGdF/MNXmCx62mDKMMc5Oa"
          crossorigin="anonymous"></script>
  <script src="/admin/js/login.js"></script>
</body>
</html>
